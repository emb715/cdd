name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Publish @emb715/cdd
        run: |
          OUTPUT=$(npm publish --workspace=packages/cdd --access public --provenance 2>&1) && echo "$OUTPUT" || {
            EXIT_CODE=$?
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "EPUBLISHCONFLICT\|already exists\|previously published"; then
              echo "Version already published, skipping."
              exit 0
            else
              echo "Publish failed with unexpected error (exit $EXIT_CODE)"
              exit $EXIT_CODE
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
